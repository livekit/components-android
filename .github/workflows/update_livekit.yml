name: Update LiveKit SDK version

on:
  repository_dispatch:
    types: [update-livekit-version]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    name: Update LiveKit SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update LiveKit Version
        run: ./ci/update_livekit_version.sh "${{ github.event.client_payload.version }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CHANGESET_GH_TOKEN }}
          branch: update-livekit-sdk/${{ github.event.client_payload.version }}
          title: Update LiveKit SDK to ${{ github.event.client_payload.version }}
          commit-message: Update LiveKit SDK to ${{ github.event.client_payload.version }}
